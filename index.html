<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Práctica de Escritura de Números</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .wrap {
      width: 100%;
      max-width: 580px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #1a1a18;
    }

    /* Score bar */
    .score-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 1.25rem;
      padding: 12px 16px;
      border-radius: 12px;
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
    }
    .score-item { text-align: center; flex: 1; }
    .score-n { font-size: 22px; font-weight: 500; color: #1a1a18; }
    .score-l { font-size: 12px; color: #888; margin-top: 2px; }

    /* Progress bar */
    .progress {
      height: 4px;
      border-radius: 2px;
      background: #e0ded8;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: #2d7a4f;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* Level buttons */
    .levels {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .lvl {
      padding: 6px 14px;
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 20px;
      cursor: pointer;
      background: transparent;
      color: #555;
      transition: all 0.15s;
      font-family: inherit;
    }
    .lvl:hover { background: #eeecea; }
    .lvl.active {
      background: #dbeafe;
      color: #1d4ed8;
      border-color: transparent;
      font-weight: 500;
    }

    /* Number display */
    .number-display {
      text-align: center;
      padding: 2rem 1rem;
      margin-bottom: 1.5rem;
      border-radius: 12px;
      border: 0.5px solid rgba(0,0,0,0.1);
      background: #eeecea;
    }
    .number-big {
      font-size: 64px;
      font-weight: 500;
      color: #1a1a18;
      line-height: 1;
    }
    .number-sub {
      font-size: 13px;
      color: #999;
      margin-top: 10px;
    }

    /* Input row */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .input-row input {
      flex: 1;
      font-size: 16px;
      font-family: inherit;
      padding: 8px 12px;
      border: 0.5px solid rgba(0,0,0,0.25);
      border-radius: 8px;
      background: #fff;
      color: #1a1a18;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input:focus {
      border-color: #1d4ed8;
      box-shadow: 0 0 0 3px rgba(29,78,216,0.12);
    }
    .input-row button {
      padding: 8px 18px;
      font-size: 15px;
      font-family: inherit;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      background: transparent;
      color: #1a1a18;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
    }
    .input-row button:hover { background: #eeecea; }
    .input-row button:disabled { opacity: 0.4; cursor: default; }

    /* Feedback */
    .feedback {
      display: none;
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 15px;
      line-height: 1.5;
    }
    .feedback.ok {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 0.5px solid #86efac;
    }
    .feedback.err {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 0.5px solid #fca5a5;
    }
    .feedback.hint {
      display: block;
      background: #fef9c3;
      color: #854d0e;
      border: 0.5px solid #fde047;
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .actions button {
      padding: 8px 16px;
      font-size: 15px;
      font-family: inherit;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      background: transparent;
      color: #1a1a18;
      cursor: pointer;
      transition: background 0.12s;
    }
    .actions button:hover { background: #eeecea; }
    .actions button.primary {
      flex: 1;
      background: #1a1a18;
      color: #fff;
      border-color: transparent;
    }
    .actions button.primary:hover { background: #333; }

    @media (max-width: 480px) {
      .number-big { font-size: 48px; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <h1>Escritura de números</h1>

  <div class="score-bar">
    <div class="score-item">
      <div class="score-n" id="sc-correct">0</div>
      <div class="score-l">correctas</div>
    </div>
    <div class="score-item">
      <div class="score-n" id="sc-wrong">0</div>
      <div class="score-l">incorrectas</div>
    </div>
    <div class="score-item">
      <div class="score-n" id="sc-streak">0</div>
      <div class="score-l">racha</div>
    </div>
  </div>

  <div class="progress">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="levels" id="levels">
    <button class="lvl active" data-min="1"      data-max="9">Unidades<br><small>1 – 9</small></button>
    <button class="lvl"        data-min="10"     data-max="99">Decenas<br><small>10 – 99</small></button>
    <button class="lvl"        data-min="100"    data-max="999">Centenas<br><small>100 – 999</small></button>
    <button class="lvl"        data-min="1000"   data-max="9999">Miles<br><small>1.000 – 9.999</small></button>
    <button class="lvl"        data-min="10000"  data-max="99999">Decenas de mil<br><small>10.000 – 99.999</small></button>
    <button class="lvl"        data-min="100000" data-max="100000">Centena de mil<br><small>100.000</small></button>
    <button class="lvl"        data-min="1"      data-max="100000">Todos<br><small>1 – 100.000</small></button>
  </div>

  <div class="number-display">
    <div class="number-big" id="num-display">—</div>
    <div class="number-sub">Escribe el número con letras</div>
  </div>

  <div class="input-row">
    <input
      type="text"
      id="answer-input"
      placeholder="Escribe aquí..."
      autocomplete="off"
      spellcheck="false"
    />
    <button id="check-btn" onclick="checkAnswer()">Verificar</button>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="actions">
    <button onclick="showHint()">Pista</button>
    <button class="primary" onclick="nextNumber()">Siguiente número →</button>
  </div>
</div>

<script>
  /* ── Datos del español ─────────────────────────────── */
  const units       = ['','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve'];
  const teens       = ['diez','once','doce','trece','catorce','quince',
                        'dieciséis','diecisiete','dieciocho','diecinueve'];
  const veintiX     = ['veinte','veintiuno','veintidós','veintitrés','veinticuatro',
                        'veinticinco','veintiséis','veintisiete','veintiocho','veintinueve'];
  const tensArr     = ['','diez','veinte','treinta','cuarenta','cincuenta',
                        'sesenta','setenta','ochenta','noventa'];
  const hundredsArr = ['','ciento','doscientos','trescientos','cuatrocientos','quinientos',
                        'seiscientos','setecientos','ochocientos','novecientos'];

  function below100(n) {
    if (n === 0) return '';
    if (n < 10)  return units[n];
    if (n < 20)  return teens[n - 10];
    if (n < 30)  return veintiX[n - 20];
    const t = Math.floor(n / 10), u = n % 10;
    return u === 0 ? tensArr[t] : tensArr[t] + ' y ' + units[u];
  }

  function below1000(n) {
    if (n === 0)   return '';
    if (n === 100) return 'cien';
    if (n < 100)   return below100(n);
    const h = Math.floor(n / 100), rest = n % 100;
    return rest === 0 ? hundredsArr[h] : hundredsArr[h] + ' ' + below100(rest);
  }

  function toSpanish(n) {
    if (n === 0)      return 'cero';
    if (n === 100000) return 'cien mil';
    if (n < 1000)     return below1000(n);
    const th = Math.floor(n / 1000), rest = n % 1000;
    const thousands = th === 1 ? 'mil' : below1000(th) + ' mil';
    return rest === 0 ? thousands : thousands + ' ' + below1000(rest);
  }

  /* ── Normalización para comparar ───────────────────── */
  function normalize(s) {
    return s.toLowerCase().trim()
      .replace(/[áà]/g,'a').replace(/[éè]/g,'e')
      .replace(/[íì]/g,'i').replace(/[óò]/g,'o')
      .replace(/[úùü]/g,'u')
      .replace(/\s+/g,' ')
      .replace(/[^a-z ]/g,'');
  }

  /* ── Estado ─────────────────────────────────────────── */
  let current = 0, correct = 0, wrong = 0, streak = 0, answered = false;
  let minVal = 1, maxVal = 9;

  /* ── Niveles ────────────────────────────────────────── */
  document.querySelectorAll('.lvl').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lvl').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      minVal = +btn.dataset.min;
      maxVal = +btn.dataset.max;
      nextNumber();
    });
  });

  /* ── Helpers ─────────────────────────────────────────── */
  function randInt(a, b) {
    return Math.floor(Math.random() * (b - a + 1)) + a;
  }

  function updateScoreboard() {
    document.getElementById('sc-correct').textContent = correct;
    document.getElementById('sc-wrong').textContent   = wrong;
    document.getElementById('sc-streak').textContent  = streak;
    const total = correct + wrong;
    const pct   = total > 0 ? Math.round(correct / total * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  /* ── Lógica principal ────────────────────────────────── */
  function nextNumber() {
    current  = randInt(minVal, maxVal);
    answered = false;
    document.getElementById('num-display').textContent   = current.toLocaleString('es');
    document.getElementById('answer-input').value        = '';
    document.getElementById('feedback').className        = 'feedback';
    document.getElementById('feedback').textContent      = '';
    document.getElementById('check-btn').disabled        = false;
    document.getElementById('answer-input').focus();
  }

  function checkAnswer() {
    if (answered) return;
    const userRaw = document.getElementById('answer-input').value;
    if (!userRaw.trim()) return;

    const expected = toSpanish(current);
    answered = true;
    document.getElementById('check-btn').disabled = true;

    const fb = document.getElementById('feedback');
    if (normalize(userRaw) === normalize(expected)) {
      correct++; streak++;
      fb.className   = 'feedback ok';
      fb.textContent = '¡Correcto! ' + expected;
    } else {
      wrong++; streak = 0;
      fb.className   = 'feedback err';
      fb.innerHTML   = '✗ La respuesta correcta es: <strong>' + expected + '</strong>';
    }
    updateScoreboard();
  }

  function showHint() {
    if (answered) return;
    const words = toSpanish(current).split(' ');
    const half  = words.slice(0, Math.ceil(words.length / 2)).join(' ');
    const fb    = document.getElementById('feedback');
    fb.className   = 'feedback hint';
    fb.textContent = 'Pista: ' + half + '...';
  }

  /* ── Teclado ─────────────────────────────────────────── */
  document.getElementById('answer-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') answered ? nextNumber() : checkAnswer();
  });

  /* ── Inicio ──────────────────────────────────────────── */
  nextNumber();
</script>

</body>
</html>
